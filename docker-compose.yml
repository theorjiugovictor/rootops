# ─── RootOps — Docker Compose ─────────────────────────────────────
# Pulls pre-built images from GitHub Container Registry.
# No source code or build tools required.
#
# Usage:
#   docker compose up -d           # start everything in background
#   docker compose down            # stop everything
#   docker compose logs -f api     # follow API logs
#
# First run: Ollama will pull the LLM model (~4 GB). Run 'make up'
# instead of 'docker compose up' to have this handled automatically.

services:
  # ── PostgreSQL + pgvector ────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: rootops-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rootops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rootops}
      POSTGRES_DB: ${POSTGRES_DB:-rootops}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rootops -d rootops"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Ollama (Local LLM — free, no API key) ───────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: rootops-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── RootOps API ─────────────────────────────────────────────
  api:
    image: ghcr.io/theorjiugovictor/rootops-api:latest
    container_name: rootops-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-rootops}:${POSTGRES_PASSWORD:-rootops}@db:5432/${POSTGRES_DB:-rootops}
      APP_NAME: RootOps
      DEBUG: ${DEBUG:-false}

      # ── LLM Backend ──────────────────────────────────────────
      # Options: ollama (default), openai, anthropic, bedrock
      LLM_BACKEND: ${LLM_BACKEND:-ollama}

      # Ollama (default — runs locally, no API key needed)
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}

      # OpenAI (optional — set OPENAI_API_KEY in .env)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}

      # Anthropic (optional — set ANTHROPIC_API_KEY in .env)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}

      # AWS Bedrock (optional — requires AWS credentials)
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-}
      BEDROCK_REGION: ${BEDROCK_REGION:-us-east-1}

      # ── Embeddings ───────────────────────────────────────────
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-jinaai/jina-embeddings-v2-base-code}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-768}
      HF_HOME: /home/rootops/.cache/huggingface

      # ── GitHub (optional — for Auto-Heal PR creation) ────────
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_DEFAULT_REPO: ${GITHUB_DEFAULT_REPO:-}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      # HuggingFace model cache — persisted on host so the embedding model
      # (~600 MB) is only downloaded once across container rebuilds
      - ${HF_HOME:-~/.cache/huggingface}:/home/rootops/.cache/huggingface

  # ── RootOps Web (Next.js) ────────────────────────────────────
  web:
    image: ghcr.io/theorjiugovictor/rootops-web:latest
    container_name: rootops-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # Internal Docker network address of the API — used by the Next.js
      # server to proxy /api/* requests. Not exposed to the browser.
      NEXT_PUBLIC_API_URL: http://api:8000
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  pgdata:
    driver: local
  ollama_data:
    driver: local
