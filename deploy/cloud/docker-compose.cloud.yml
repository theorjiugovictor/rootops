# ─── RootOps — Cloud Deployment Override ────────────────────────
# Adds Caddy reverse proxy with automatic HTTPS via Duck DNS.
#
# Usage (with base compose):
#   docker compose -f docker-compose.yml -f deploy/cloud/docker-compose.cloud.yml up -d
#
# Required in .env:
#   DUCKDNS_SUBDOMAIN  — your subdomain (e.g. "rootops")
#   DUCKDNS_TOKEN      — your Duck DNS API token

services:
  # ── Caddy — reverse proxy with automatic HTTPS ──────────────
  caddy:
    build:
      context: ./deploy/cloud
      dockerfile: Dockerfile.caddy
    container_name: rootops-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./deploy/cloud/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DUCKDNS_SUBDOMAIN}.duckdns.org
      DUCKDNS_TOKEN: ${DUCKDNS_TOKEN}
    depends_on:
      - api
      - web
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--no-check-certificate", "https://localhost:443/"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── API: add the cloud domain to CORS ────────────────────────
  api:
    command: >
      python -m uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
    environment:
      CORS_ALLOWED_ORIGINS: "https://${DUCKDNS_SUBDOMAIN}.duckdns.org,http://localhost:3000,http://web:3000"
      # ── LLM: on ≤8 GB VMs, defaults to "openai" (Ollama is too slow).
      # Provide ONE of these API keys to enable AI answers:
      #   OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      #   ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      #   LLM_BACKEND: bedrock   (uses IAM, no key)
      # Or: FORCE_OLLAMA=true + LLM_BACKEND=ollama (slow, 3-5 min/query).
      # Embedding / ingestion auto-tuning needs no overrides.

  # ── Ollama: keep model loaded, use less memory ───────────────
  ollama:
    environment:
      # Never unload the model — avoids 30s reload on each query
      OLLAMA_KEEP_ALIVE: "-1"
      # Limit parallel requests to 1 to save memory
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"

  # ── Web: ensure API URL points to internal Docker network ────
  web:
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000

volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local
